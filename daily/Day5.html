<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Day 5 · 今日任务</title>
<style>
  :root{ --teal:#0f766e; --teal2:#14b8a6; --ink:#1c2430; --mut:#64748b; --line:#e2e8f0; --bg:#f8fafc; --rose:#be123c; --gold:#d97706; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{font-family:"PingFang SC","Hiragino Sans GB",-apple-system,"Helvetica Neue",Arial,sans-serif; color:var(--ink); background:var(--bg); margin:0; line-height:1.5;}
  .wrap{max-width:720px; margin:0 auto; padding:16px 14px 70px;}
  h1{font-size:19px; margin:0 0 2px; color:var(--teal);}
  .muted{color:var(--mut); font-size:12.5px;}
  .overall{background:#fff; border:1px solid var(--line); border-radius:14px; padding:13px 15px; margin:10px 0 16px;}
  .ov-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
  .ov-num{font-size:15px; font-weight:700;} .ov-num b{color:var(--teal); font-size:20px;}
  .bar{height:9px; background:#eef2f6; border-radius:99px; overflow:hidden;}
  .bar>i{display:block; height:100%; background:linear-gradient(90deg,var(--teal),var(--teal2)); border-radius:99px; transition:width .35s;}
  .card{background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin-bottom:10px; cursor:pointer; display:flex; align-items:center; gap:12px;}
  .card:active{transform:scale(.99);}
  .badge{flex:0 0 40px; height:40px; border-radius:11px; background:#ecfdf5; color:var(--teal); font-size:20px; display:flex; align-items:center; justify-content:center; border:1px solid #c7f0e8;}
  .card.done .badge{background:var(--teal); color:#fff; border-color:var(--teal);}
  .card.w .badge{background:#fff1f2; color:var(--rose); border-color:#fecdd3;}
  .card.w.done .badge{background:var(--rose); color:#fff; border-color:var(--rose);}
  .c-body{flex:1; min-width:0;}
  .c-title{font-weight:700; font-size:14.5px;}
  .c-sub{color:var(--mut); font-size:11.5px; margin:1px 0 6px;}
  .tick{flex:0 0 auto; font-size:12px; color:var(--mut);} .card.done .tick{color:var(--teal); font-weight:700;}
  .back{display:inline-flex; gap:5px; background:none; border:none; color:var(--teal); font-size:14px; font-weight:600; padding:6px 0; cursor:pointer;}
  .d-title{font-size:18px; font-weight:800; margin:4px 0 2px;}
  .d-cue{color:var(--mut); font-size:12.5px; font-style:italic; margin-bottom:10px;}
  .chain{background:#ecfdf5; border:1px dashed #5eead4; border-radius:10px; padding:9px 12px; font-size:13.5px; margin:6px 0; line-height:1.6;}
  .chain .lab{font-size:11px; color:var(--teal); font-weight:700; display:block; margin-bottom:3px;}
  .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:10px 0;}
  .btn{border:1px solid var(--line); background:#fff; border-radius:10px; padding:9px 13px; font-size:13px; cursor:pointer; color:var(--ink); font-weight:600;}
  .btn.primary{background:var(--teal); color:#fff; border-color:var(--teal);}
  .btn.rose{background:var(--rose); color:#fff; border-color:var(--rose);}
  .btn.on{background:var(--gold); color:#fff; border-color:var(--gold);}
  .btn.ghost{color:var(--mut);} .btn:active{transform:scale(.97);}
  audio{height:34px; vertical-align:middle; max-width:100%;}
  .step{background:#fff; border:1px solid var(--line); border-radius:12px; padding:11px 13px; margin:9px 0;}
  .step.full{border-color:var(--teal); background:#f0fdfa;}
  .step-top{display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .step-name{font-weight:700; font-size:14px;} .step-name .sub{font-weight:400; color:var(--mut); font-size:11.5px;}
  .dots{display:flex; gap:5px; align-items:center;}
  .dot{width:15px; height:15px; border-radius:50%; border:2px solid #cbd5e1; background:#fff;} .dot.on{background:var(--teal); border-color:var(--teal);}
  .plus{width:34px; height:34px; border-radius:9px; border:1px solid var(--teal); background:#fff; color:var(--teal); font-size:20px; font-weight:700; cursor:pointer;} .plus:disabled{opacity:.3;}
  .script{background:#fffdf7; border:1px solid #e7d9b8; border-radius:12px; padding:12px 14px; margin:8px 0; font-size:15px; line-height:1.72; color:#22302c;}
  .script p{margin:0 0 9px;} .script p:last-child{margin:0;}
  .script.hidden{filter:blur(7px); user-select:none;}
  .w-tok{border-radius:3px; padding:0 1px;}
  .annot .w-tok{cursor:pointer;} .annot .w-tok:hover{background:#fef3c7;}
  .w-tok.hl{background:#fde68a;}
  .tools{display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 2px;}
  textarea{width:100%; min-height:130px; border:1px solid var(--line); border-radius:10px; padding:11px; font-size:15px; font-family:inherit; line-height:1.55; resize:vertical;}
  .hint{font-size:11.5px; color:var(--mut); margin:4px 2px;}
  .diff{background:#fff; border:1px solid var(--line); border-radius:12px; padding:11px 13px; margin:8px 0; font-size:15px; line-height:1.7;}
  .diff .miss{color:#dc2626; text-decoration:underline; text-decoration-style:wavy; text-underline-offset:2px;}
  .diff .sum{font-size:13px; font-weight:700; margin-bottom:7px;}
  .diff .sum .g{color:var(--teal);} .diff .sum .r{color:#dc2626;}
  .qa .q{background:#fafafa; border-left:3px solid #94a3b8; padding:4px 9px; font-style:italic; margin:8px 0 4px; font-size:13px;}
  .qa .a{font-size:14.5px; line-height:1.55;}
  .skel{background:#fff1f2; border:1px solid #fecdd3; border-radius:10px; padding:9px 12px; font-size:14px; margin:8px 0; line-height:1.6;}
  .congrats{background:#ecfdf5; border:1px solid #5eead4; color:#0f766e; border-radius:12px; padding:10px 13px; font-size:13.5px; margin:8px 0; font-weight:600; text-align:center;}
  .must{background:#fff1f2; border:1px solid #fecdd3; color:#be123c; border-radius:10px; padding:8px 12px; font-size:12.5px; margin:6px 0; font-weight:600;}
  .foot{text-align:center; color:#94a3b8; font-size:11px; margin-top:22px;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const KEY='ielts_day5_v1';
let state=JSON.parse(localStorage.getItem(KEY)||'{}');
function save(){ localStorage.setItem(KEY,JSON.stringify(state)); }
function st(id){ return state[id]||(state[id]={}); }
let hide=false, annot=false, view={name:'list',id:null};

const ITEMS=[
{id:'E',type:'memo',icon:'🎤',title:'母题 E · 喜欢的城市（主背·新）',sub:'读×3 → 关键词×2 → 默写×1',
 cue:'Describe a city you like / would recommend to visit',audio:'../audio-E.m4a?v=9',seg:'audio-E',
 chain:'香港 → 来一个月、还新鲜 → 第一印象:拥挤/国际/贵 → 最爱:海+港大学术氛围+国际化、开眼界 → 住西营盘、街道上下坡、坡上能同时看到高楼和海 → 不完美:挤又贵、不会久住 → 但很适合年轻人来体验 → 推荐给同龄人',
 script:[
"The city I'd like to talk about is Hong Kong, where I'm currently living while I do my PhD. I arrived about a month ago, so it still feels quite new to me. My first impression was that it's an extremely crowded, international and rather expensive city.",
"What I like most is the combination of the sea, the strong academic atmosphere at HKU, and the international environment. I get to meet people from all over the world, which has really broadened my perspective. I'm also fond of the area where I live, Sai Ying Pun, where the streets rise and fall steeply, and from a slope you can sometimes see the tall buildings and the sea at the same time.",
"Of course, it isn't perfect. It's crowded and fairly expensive, so I probably wouldn't settle here permanently. Even so, it's a wonderful place to experience, especially for young people who want to study and enjoy a different way of life.",
"Overall, I would happily recommend Hong Kong to almost anyone around my age."]},
{id:'D',type:'review',icon:'🔁',title:'母题 D · 团队合作（复习）',sub:'看关键词链复述 1 遍',
 cue:'Describe a time you worked in a team',audio:'../audio-D.m4a?v=9',seg:'audio-D',
 chain:'组织班级篮球赛(3男2女)→ 我管整体 → 开局先齐心:球衣没到、借别学院队服 → 没特长生但超团结、分工明确(我防守+垃圾话)→ 累了就互相打气 → 1+1>2 → 季军、眼泪夺眶、脚磨泡、为一个目标一起拼',
 script:[
"The teamwork experience I'd like to talk about was a basketball tournament that I helped organise for my class. We had mixed teams, with three boys and two girls on court, and I was responsible for managing the whole event.",
"Right from the start, we had to work together. The jerseys we had ordered didn't arrive in time, so I quickly borrowed some kits from another faculty so that the teams could be told apart. Sorting that problem out together actually helped us bond early on.",
"What I'm most proud of is that, even though we had no outstanding players, we were extremely united. Everyone had a clear role: I took charge of defence, and I also used a bit of friendly trash-talk to distract the other team. Whenever someone got tired, we encouraged each other, and it really felt like we achieved far more as a team than we ever could have on our own.",
"In the end, we finished third. I was so moved that I actually teared up — my feet were covered in blisters and everyone was exhausted, but we had worked towards the same goal together. It's an experience I'll never forget."]},
{id:'P1',type:'p1',icon:'🗣️',title:'P1 · Hometown + Building（新）',sub:'每个问答可单独听:男声问 + Ava 答',
 qa:[
 {q:'Where is your hometown?',a:"My hometown is Yan'an, a city in northern Shaanxi. It isn't very large, but it's well known as the 'Red Capital' because of its revolutionary history, and it's surrounded by mountains."},
 {q:'Do you like your hometown?',a:"Yes, I do. I feel a strong connection to it because I grew up there. What I like most is its relaxed pace of life and how down-to-earth the people are. I probably won't live there permanently, but I always enjoy going back."},
 {q:'Are there any tall buildings near your home?',a:"Yes, there are plenty. Hong Kong is incredibly dense, so there are tall buildings almost everywhere. It's very convenient, although it can feel a little crowded at times."},
 {q:'Is there a building you would like to visit?',a:"I'd love to visit some famous university libraries. To me, a library is more than just a building; it reflects the history and atmosphere of a place, and I really enjoy the quietness inside."}]},
{id:'CR',type:'chartrev',icon:'📊',title:'小作文复习 · 折线图 + 柱状图',sub:'读范文 + 听,复习结构与趋势/比较词',
 charts:[
  {label:'📈 折线图',audio:'../essay-line.m4a?v=9',model:"The line graph illustrates the number of visitors to three museums in London between 2010 and 2020. Overall, it is clear that all three museums saw an increase, with the British Museum remaining the most popular throughout. In 2010, the British Museum received around 5 million visitors, and this figure rose steadily to about 6.5 million in 2020. The Science Museum, meanwhile, started at just 2 million and climbed gradually to 3.5 million, while the Natural History Museum fluctuated around 3 million before ending at roughly 4 million."},
  {label:'📊 柱状图',audio:'../essay-bar.m4a?v=9',model:"The bar chart compares the percentage of households with internet access in four countries — the UK, Germany, France and Italy — in 2010 and 2020. Overall, it is clear that internet access increased in all four countries over the decade, with the UK having the highest level in both years. In 2010, around 70% of UK households had internet access, and this rose to roughly 95% by 2020. Germany followed a similar pattern, climbing from about 65% to 90%. France and Italy started lower, at approximately 55% and 50% respectively, but both saw significant growth, reaching around 80% and 75% by the end of the period."}
 ]},
{id:'SH',type:'shadow',icon:'🎬',title:'跟读老友记 1 段',sub:'选 30–90 秒,慢半秒跟读',
 steps:["选 30–90 秒片段(听懂≈80%)","带字幕听 2–3 遍","慢半秒跟读:模仿语调 / 重音 / 连读","录音对比,记 1–2 个差异","用自己的话复述一遍"]}
];

function isDone(i){ const s=st(i.id);
 if(i.type==='memo') return (s.read||0)>=3&&(s.recall||0)>=2&&(s.dictate||0)>=1;
 return !!s.done; }
function frac(i){ const s=st(i.id);
 if(i.type==='memo') return (Math.min(s.read||0,3)+Math.min(s.recall||0,2)+Math.min(s.dictate||0,1))/6;
 return isDone(i)?1:0; }
const app=document.getElementById('app');

function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function scriptHTML(i){
 const s=st(i.id); const set=new Set(s.hl||[]);
 var SPD='<select class="spd" style="border:1px solid #e2e8f0;border-radius:8px;padding:4px;font-size:12px" onchange="spdSel(this)"><option value="0.75">0.75×</option><option value="1" selected>1×</option><option value="1.25">1.25×</option><option value="1.5">1.5×</option><option value="2">2×</option></select>';
 let segs='';
 if(i.seg){ segs='<div class="hint" style="margin-top:8px">🎧 分段跟读(每段可单独播放 / 倍速 / 循环):</div>';
   i.script.forEach((para,pi)=>{ segs+=`<div class="row" style="gap:6px;margin:4px 0"><span style="font-size:12px;color:#64748b;flex:0 0 40px">第${pi+1}段</span><audio controls preload="auto" src="../${i.seg}-${pi+1}.m4a?v=9" style="flex:1;min-width:110px;height:32px"></audio><button class="btn loop" onclick="lp(this)">🔁</button>${SPD}</div>`; });
 }
 const ps=i.script.map((para,pi)=>{
   let wi=0;
   const html=esc(para).replace(/[A-Za-z0-9'’\-]+/g,(w)=>{
     const k=pi+'-'+wi; wi++; const on=set.has(k)?' hl':'';
     return `<span class="w-tok${on}" ${annot?`onclick="hl(this,'${i.id}','${k}')"`:''}>${w}</span>`;
   });
   return `<p>${html}</p>`;
 }).join('');
 return `${segs}<div class="tools">
   <button class="btn ${annot?'on':''}" onclick="toggleAnnot()">✏️ 标注关键词 ${annot?'(开)':'(关)'}</button>
   <button class="btn ghost" onclick="toggleHide()">${hide?'👁 显示原文':'🙈 隐藏原文'}</button></div>
  <div class="hint">${annot?'点任意单词高亮/取消,自动保存。':'点"标注关键词"后即可点词高亮。复述/默写时点"隐藏原文"。'}</div>
  <div class="script ${hide?'hidden':''}">${ps}</div>`;
}
function hl(el,id,k){ const s=st(id); s.hl=s.hl||[]; const set=new Set(s.hl);
 if(set.has(k)){set.delete(k); el.classList.remove('hl');} else {set.add(k); el.classList.add('hl');}
 s.hl=[...set]; save(); }
function toggleAnnot(){ annot=!annot; if(annot) hide=false; renderDetail(); }
function toggleHide(){ hide=!hide; if(hide) annot=false; renderDetail(); }

function norm(arr){ return arr.map(w=>w.toLowerCase().replace(/’/g,"'")); }
function toks(t){ return (t.match(/[A-Za-z0-9'’\-]+/g)||[]); }
function lcsMatched(o,u){
 const n=o.length,m=u.length;
 const dp=Array.from({length:n+1},()=>new Int16Array(m+1));
 for(let a=n-1;a>=0;a--)for(let b=m-1;b>=0;b--)dp[a][b]=o[a]===u[b]?dp[a+1][b+1]+1:Math.max(dp[a+1][b],dp[a][b+1]);
 const matched=new Array(n).fill(false); let a=0,b=0;
 while(a<n&&b<m){ if(o[a]===u[b]){matched[a]=true;a++;b++;} else if(dp[a+1][b]>=dp[a][b+1])a++; else b++; }
 return matched;
}
function checkDict(id){
 const i=ITEMS.find(x=>x.id===id); const ta=document.getElementById('dict');
 st(id).dictText=ta.value; save();
 const full=i.script.join(' ');
 const oRaw=toks(full), oN=norm(oRaw), uN=norm(toks(ta.value));
 if(uN.length===0){ document.getElementById('dictRes').innerHTML='<div class="hint">先在框里写点东西再对照~</div>'; return; }
 const matched=lcsMatched(oN,uN);
 const correct=matched.filter(Boolean).length, total=oRaw.length, missed=total-correct, extra=Math.max(0,uN.length-correct);
 let wi=0; const disp=esc(full).replace(/[A-Za-z0-9'’\-]+/g,(w)=>{ const c=matched[wi]?'':' class="miss"'; wi++; return `<span${c}>${w}</span>`; });
 document.getElementById('dictRes').innerHTML=
   `<div class="diff"><div class="sum">对了 <span class="g">${correct}/${total}</span> 词 · 漏或错 <span class="r">${missed}</span> 词${extra?` · 多写约 ${extra} 词`:''}</div>
     ${disp}<div class="hint" style="margin-top:8px">红色波浪 = 漏掉或记错的词。考试用自己的话说就行,不必一字不差。</div></div>`;
}
function saveDictBox(id){ st(id).dictText=document.getElementById('dict').value; save(); }
function saveEssay(id){ st(id).text=document.getElementById('essay').value; save(); }

function renderList(){
 const done=ITEMS.filter(isDone).length;
 const ov=Math.round(ITEMS.reduce((a,i)=>a+frac(i),0)/ITEMS.length*100);
 let h=`<h1>📍 Day 5 · 今日任务</h1><div class="muted">推进度:新母题 E 城市 + 复习(母题 D、P1、小作文 折线/柱状)</div>
  <div class="overall"><div class="ov-top"><div class="ov-num"><b>${done}</b> / ${ITEMS.length} 完成</div><div class="muted">今日进度 ${ov}%</div></div><div class="bar"><i style="width:${ov}%"></i></div></div>`;
 ITEMS.forEach(i=>{ h+=`<div class="card ${isDone(i)?'done':''} ${(i.type==='writing')?'w':''}" onclick="open_('${i.id}')">
   <div class="badge">${i.icon}</div>
   <div class="c-body"><div class="c-title">${i.title}</div><div class="c-sub">${i.sub}</div><div class="bar" style="height:6px"><i style="width:${Math.round(frac(i)*100)}%"></i></div></div>
   <div class="tick">${isDone(i)?'✓':Math.round(frac(i)*100)+'%'}</div></div>`; });
 h+=`<div class="foot">进度自动存本机 · 作文写完把草稿发我批改</div>`;
 app.innerHTML=h;
}
function open_(id){ view={name:'detail',id}; hide=false; annot=false; renderDetail(); scrollTo(0,0); }
function goList(){ view={name:'list'}; renderList(); scrollTo(0,0); }

function renderDetail(){
 const i=ITEMS.find(x=>x.id===view.id); const s=st(i.id);
 let h=`<button class="back" onclick="goList()">← 返回今日任务</button><div class="d-title">${i.icon} ${i.title}</div>`;
 if(i.cue)h+=`<div class="d-cue">${i.cue}</div>`;
 h+=`<div class="bar"><i style="width:${Math.round(frac(i)*100)}%"></i></div>`;

 if(i.type==='memo'){
   if(i.audio)h+=`<div class="row"><audio controls preload="auto" src="${i.audio}"></audio><button class="btn loop" onclick="lp(this)">🔁</button><select class="spd" style="border:1px solid #e2e8f0;border-radius:10px;padding:7px 4px;font-size:13px;font-weight:600;background:#fff;color:#1c2430" onchange="spdSel(this)" title="倍速"><option value="0.75">0.75×</option><option value="1" selected>1×</option><option value="1.25">1.25×</option><option value="1.5">1.5×</option><option value="2">2×</option></select><span class="hint">边听边读</span></div>`;
   h+=`<div class="chain"><span class="lab">关键词链(背这串)</span>${i.chain}</div>`;
   if(isDone(i))h+=`<div class="congrats">🎉 这篇练熟了!</div>`;
   [['read','朗读全文','出声读',3],['recall','看关键词链复述','盖住原文,自己的话',2],['dictate','默写检验','写完点 + 记一遍',1]].forEach(([k,n,sub,t])=>{
     const v=s[k]||0,full=v>=t; let d=''; for(let x=0;x<t;x++)d+=`<span class="dot ${x<v?'on':''}"></span>`;
     h+=`<div class="step ${full?'full':''}"><div class="step-top"><div class="step-name">${full?'✓ ':''}${n} <span class="sub">· ${sub}</span></div><div class="dots">${d}<button class="plus" ${full?'disabled':''} onclick="inc('${i.id}','${k}',${t})">+</button></div></div></div>`;
   });
   h+=`<div class="step"><div class="step-name">✍️ 默写框（自动改错）</div>
     <div class="hint">凭记忆写这段,点"对照改错"自动标出漏/错的词。</div>
     <textarea id="dict" placeholder="在这里默写母题 E…" oninput="saveDictBox('${i.id}')">${s.dictText||''}</textarea>
     <div class="row"><button class="btn primary" onclick="checkDict('${i.id}')">对照改错</button></div>
     <div id="dictRes"></div></div>`;
   h+=scriptHTML(i);
 }
 else if(i.type==='review'){
   if(i.audio)h+=`<div class="row"><audio controls preload="auto" src="${i.audio}"></audio><button class="btn loop" onclick="lp(this)">🔁</button><select class="spd" style="border:1px solid #e2e8f0;border-radius:10px;padding:7px 4px;font-size:13px;font-weight:600;background:#fff;color:#1c2430" onchange="spdSel(this)" title="倍速"><option value="0.75">0.75×</option><option value="1" selected>1×</option><option value="1.25">1.25×</option><option value="1.5">1.5×</option><option value="2">2×</option></select><span class="hint">边听边读</span></div>`;
   h+=`<div class="chain"><span class="lab">关键词链</span>${i.chain}</div><div class="hint">先盖住原文复述一遍,卡了再看。</div>`;
   h+=scriptHTML(i);
   h+=`<div class="row"><button class="btn ${isDone(i)?'':'primary'}" onclick="toggleDone('${i.id}')">${isDone(i)?'✓ 已复述(点取消)':'复述完了 ✓'}</button></div>`;
 }
 else if(i.type==='p1'){
   h+=`<div class="hint">P1 答 2–3 句、像聊天。每个问答可单独点播放(男声问 + Ava 答)、可🔁循环。</div><div class="qa">`;
   const P1AU={"Where is your hometown?":"../p1-hometown1.m4a?v=9","Do you like your hometown?":"../p1-hometown2.m4a?v=9","Are there any tall buildings near your home?":"../p1-building1.m4a?v=9","Is there a building you would like to visit?":"../p1-building2.m4a?v=9"};
   i.qa.forEach(x=>{ var au=P1AU[x.q]; h+=`<div class="q">${x.q}</div><div class="a">${x.a}</div>`+(au?`<div class="row" style="margin:3px 0 12px"><audio controls preload="auto" src="${au}"></audio><button class="btn loop" onclick="lp(this)">🔁</button><select class="spd" style="border:1px solid #e2e8f0;border-radius:10px;padding:7px 4px;font-size:13px;font-weight:600;background:#fff;color:#1c2430" onchange="spdSel(this)" title="倍速"><option value="0.75">0.75×</option><option value="1" selected>1×</option><option value="1.25">1.25×</option><option value="1.5">1.5×</option><option value="2">2×</option></select></div>`:''); }); h+=`</div>`;
   h+=`<div class="row"><button class="btn ${isDone(i)?'':'primary'}" onclick="toggleDone('${i.id}')">${isDone(i)?'✓ 已说一遍':'都说了 ✓'}</button></div>`;
 }
 else if(i.type==='shadow'){
   h+=`<div class="hint">研究证实跟读能提升流利和语调(不是改口音)。步骤:</div><ol style="font-size:14px;line-height:1.7;padding-left:20px">`;
   i.steps.forEach(x=>h+=`<li>${x}</li>`); h+=`</ol>`;
   h+=`<div class="row"><button class="btn ${isDone(i)?'':'primary'}" onclick="toggleDone('${i.id}')">${isDone(i)?'✓ 跟读完成':'跟读完成 ✓'}</button></div>`;
 }
 else if(i.type==='chartrev'){
   h+=`<div class="hint">复习:读一遍范文 + 听音频,记住结构(改写题目 → Overview → 细节 2 段)和趋势/比较词。</div>`;
   i.charts.forEach(c=>{
     h+=`<div class="script"><b style="color:#0f766e">${c.label} · 范文</b><div class="row" style="margin:7px 0"><audio controls preload="auto" src="${c.audio}"></audio><button class="btn loop" onclick="lp(this)">🔁</button><select class="spd" style="border:1px solid #e2e8f0;border-radius:10px;padding:7px 4px;font-size:13px;font-weight:600;background:#fff;color:#1c2430" onchange="spdSel(this)" title="倍速"><option value="0.75">0.75×</option><option value="1" selected>1×</option><option value="1.25">1.25×</option><option value="1.5">1.5×</option><option value="2">2×</option></select><span class="hint">🐢 慢速</span></div><p style="margin-top:6px">${c.model}</p></div>`;
   });
   h+=`<div class="row"><button class="btn ${isDone(i)?'':'primary'}" onclick="toggleDone('${i.id}')">${isDone(i)?'✓ 已复习(点取消)':'复习完成 ✓'}</button></div>`;
 }
 else if(i.type==='writing'){
   if(i.must)h+=`<div class="must">🔥 ${i.must}</div>`;
   h+=`<div class="d-cue" style="font-style:normal;color:#22302c;font-size:14px;background:#fafafa;border-left:3px solid #94a3b8;padding:6px 10px;border-radius:0 8px 8px 0">${i.prompt}</div>`;
   h+=`<div class="skel"><b>写法/骨架:</b><br>${i.skel}</div>`;
   if(i.frame)h+=`<div class="chain" style="background:#eff6ff;border-color:#bfdbfe"><span class="lab" style="color:#1d4ed8">🧩 万能框架(背连接句,〔〕里现填)</span>${i.frame.split('\n').filter(Boolean).map(l=>`<div style="margin:4px 0">${l}</div>`).join('')}</div>`;
   h+=`<div class="hint">${i.idea}</div>`;
   h+=`<div class="hint">在下面打草稿(自动保存)。写完发我批改。</div>
       <textarea id="essay" placeholder="在这里写…" oninput="saveEssay('${i.id}')">${s.text||''}</textarea>`;
   h+=`<div class="row"><button class="btn ghost" onclick="toggleHide()">${hide?'隐藏参考范文':'看参考范文(带朗读)'}</button>
        <button class="btn rose" onclick="toggleDone('${i.id}')">${isDone(i)?'✓ 已完成(发我批改)':'写完了 ✓'}</button></div>`;
   if(hide)h+=`<div class="script"><b style="color:#be123c">参考范文(自己先写,再对比):</b>${i.maudio?`<div class="row" style="margin:7px 0"><audio controls preload="auto" src="${i.maudio}"></audio><button class="btn loop" onclick="lp(this)">🔁</button><select class="spd" style="border:1px solid #e2e8f0;border-radius:10px;padding:7px 4px;font-size:13px;font-weight:600;background:#fff;color:#1c2430" onchange="spdSel(this)" title="倍速"><option value="0.75">0.75×</option><option value="1" selected>1×</option><option value="1.25">1.25×</option><option value="1.5">1.5×</option><option value="2">2×</option></select><span class="hint">🐢 慢速 · 边听边背</span></div>`:''}<p style="margin-top:6px">${i.model}</p></div>`;
 }
 app.innerHTML=h;
}
function inc(id,k,t){ const s=st(id); s[k]=Math.min((s[k]||0)+1,t); save(); renderDetail(); }
function toggleDone(id){ const s=st(id); s.done=!s.done; save(); renderDetail(); }
function lp(b){ var a=b.parentNode.querySelector('audio'); if(!a)return; a.loop=!a.loop; b.textContent=a.loop?'🔁 循环中':'🔁'; b.classList.toggle('on',a.loop); if(a.loop&&a.paused)a.play(); }
function spdSel(s){ var a=s.parentNode.querySelector('audio'); if(a)a.playbackRate=parseFloat(s.value); }
renderList();
</script>
</body>
</html>
