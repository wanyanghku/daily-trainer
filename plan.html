<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>IELTS 剩余 10 天冲刺总览</title>
<style>
  :root{ --teal:#0f766e; --teal2:#14b8a6; --ink:#1c2430; --mut:#64748b; --line:#e2e8f0; --bg:#f8fafc;
    --green:#0f766e; --blue:#1d4ed8; --amber:#b45309; --rose:#be123c; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{font-family:"PingFang SC","Hiragino Sans GB",-apple-system,"Helvetica Neue",Arial,sans-serif; color:var(--ink); background:var(--bg); margin:0; line-height:1.5;}
  .wrap{max-width:720px; margin:0 auto; padding:16px 14px 70px;}
  h1{font-size:20px; margin:0 0 2px; color:var(--teal);}
  .sub{color:var(--mut); font-size:12.5px; margin-bottom:12px;}
  .hero{background:linear-gradient(135deg,#0f766e,#14b8a6); color:#fff; border-radius:16px; padding:16px 18px; margin-bottom:14px;}
  .hero .cd{font-size:13px; opacity:.9;}
  .hero .big{font-size:34px; font-weight:800; line-height:1.1; margin:2px 0;}
  .hero .goal{font-size:13px; opacity:.95;}
  .pbar{height:8px; background:rgba(255,255,255,.3); border-radius:99px; overflow:hidden; margin-top:10px;}
  .pbar>i{display:block; height:100%; background:#fff; border-radius:99px; transition:width .35s;}
  .pmeta{font-size:11.5px; opacity:.9; margin-top:5px;}
  .phase{margin:16px 0 4px; font-weight:800; font-size:15px; display:flex; align-items:center; gap:7px;}
  .phase .tag{font-size:11px; font-weight:700; color:#fff; border-radius:6px; padding:1px 7px;}
  .p1 .tag{background:var(--green);} .p2 .tag{background:var(--blue);} .p3 .tag{background:var(--amber);}
  .phase .rng{font-size:11.5px; color:var(--mut); font-weight:500;}
  .card{background:#fff; border:1px solid var(--line); border-radius:12px; padding:0; margin-bottom:8px; overflow:hidden;}
  .row{display:flex; align-items:center; gap:11px; padding:11px 13px; cursor:pointer;}
  .row+.row{border-top:1px solid #f1f5f9;}
  .ck{flex:0 0 22px; width:22px; height:22px; border-radius:7px; border:2px solid #cbd5e1; display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; background:#fff;}
  .row.done .ck{background:var(--teal); border-color:var(--teal);}
  .row.done .ti{text-decoration:line-through; color:var(--mut);}
  .meta{flex:1; min-width:0;}
  .dnum{font-size:11px; color:var(--mut);}
  .ti{font-size:14px; font-weight:600; margin-top:1px;}
  .go{flex:0 0 auto; font-size:12px; color:var(--teal); font-weight:700; text-decoration:none; border:1px solid #c7f0e8; background:#ecfdf5; border-radius:8px; padding:5px 9px;}
  .exam{background:#fff1f2; border:1px solid #fecdd3; color:var(--rose); border-radius:12px; padding:13px 15px; margin:12px 0; text-align:center; font-weight:800; font-size:15px;}
  .lines{background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-top:14px;}
  .lines b{color:var(--rose);}
  .lines ul{margin:6px 0 0; padding-left:18px; font-size:13px; line-height:1.7;}
  .foot{text-align:center; color:#94a3b8; font-size:11px; margin-top:18px;}
  a.plain{color:inherit; text-decoration:none;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const KEY='ielts_plan10_v1';
let done=JSON.parse(localStorage.getItem(KEY)||'{}');
const EXAM='2026-07-23';

const DAYS=[
 {n:1,date:'07-11',ph:1,t:'G1 + P1 A复习/B起步｜环境 P3→T2 Opinion',link:'daily/Day3.html'},
 {n:2,date:'07-12',ph:1,t:'G2 妻子故事·人物外壳 + P1 B级｜城市 P3 + T1',link:'daily/Day4.html'},
 {n:3,date:'07-13',ph:1,t:'G3 同故事·观点外壳 + P1 B级｜工作 P3→T2',link:'daily/Day5.html'},
 {n:4,date:'07-14',ph:1,t:'F1 + P1 B/C级｜科技 P3主体段 + T1 图表',link:'daily/Day6.html'},
 {n:5,date:'07-15',ph:1,t:'F2 + P1 C/A级｜教育 P3→T2 利弊',link:'daily/Day7.html'},
 {n:6,date:'07-16',ph:2,t:'P2 人物套题 + P1 A级复习｜T1 流程/地图'},
 {n:7,date:'07-17',ph:2,t:'P2 事件/地点/科技套题 + P1 A级｜T2 双问题/问题解决'},
 {n:8,date:'07-18',ph:3,t:'G1/G2/G3 盲抽套题 + 口语模考 1'},
 {n:9,date:'07-19',ph:3,t:'P2 5个弱缺口核真 + P1 B/C弱项｜写作全真模考'},
 {n:10,date:'07-20',ph:3,t:'P1混合 + P2随机3题 + 口语模考 2｜弱文重写'},
];
const PH={1:{cls:'p1',tag:'完成',name:'母题 + P1 分级覆盖',rng:'7/11 – 7/15'},
         2:{cls:'p2',tag:'套用',name:'P2 套题 + P1 A级复习',rng:'7/16 – 7/17'},
         3:{cls:'p3',tag:'模考',name:'全真 + 查漏',rng:'7/18 – 7/20'}};

function daysLeft(){ const t=new Date(); t.setHours(0,0,0,0); const e=new Date(EXAM+'T00:00:00');
  return Math.round((e-t)/86400000); }
function toggle(n){ done[n]=!done[n]; localStorage.setItem(KEY,JSON.stringify(done)); render(); }

function render(){
 const total=DAYS.length, dn=DAYS.filter(d=>done[d.n]).length, pct=Math.round(dn/total*100);
 let h=`<h1>🎯 IELTS 剩余 10 天冲刺</h1><div class="sub">7/11 起 · 7/20 完成复习 · 7/23 考试</div>
  <div class="hero"><div class="cd">距离考试还有</div><div class="big">${daysLeft()} 天</div>
   <div class="goal">大陆考区 · 目标:口语 6.5 · 写作 6.5</div>
   <div class="pbar"><i style="width:${pct}%"></i></div>
   <div class="pmeta">已完成 ${dn} / ${total} 天 · ${pct}%</div></div>`;
 [1,2,3].forEach(p=>{
   const info=PH[p];
   h+=`<div class="phase ${info.cls}"><span class="tag">${info.tag}</span>${info.name}<span class="rng">· ${info.rng}</span></div><div class="card">`;
   DAYS.filter(d=>d.ph===p).forEach(d=>{
     h+=`<div class="row ${done[d.n]?'done':''}" onclick="toggle(${d.n})">
       <div class="ck">${done[d.n]?'✓':''}</div>
       <div class="meta"><div class="dnum">第 ${d.n} 天 · ${d.date}</div><div class="ti">${d.t}</div></div>
       ${d.link?`<a class="go" href="${d.link}" onclick="event.stopPropagation()">打开 →</a>`:''}</div>`;
   });
   h+=`</div>`;
 });
 h+=`<div class="exam">📝 7 / 23 考试日 · 7/21–22 只做轻复习 + 早睡 🌙</div>`;
 h+=`<div class="lines"><b>3 条不能省的红线</b><ul>
   <li>P1：A 级间隔复习；B/C 级按 Day3–7 后置覆盖。</li>
   <li>P2：A–E 已背过且冻结；G1–F2 完成后只练母题套题。</li>
   <li>G2/G3：共用妻子故事，但分别练“人物困难”和“观点变化”外壳。</li>
   <li>覆盖审计：32 Strong / 17 Medium / 5 Weak；弱缺口先核真实经历。</li>
   <li>P3→Task 2：同一观点先口答，再改成书面主体段。</li>
   <li>每天只留一张短错误单；第 10 天不再学新内容。</li></ul></div>`;
 h+=`<div class="foot"><a class="plain" href="m.html">← 回每日任务菜单</a> · 打勾自动存本机</div>`;
 document.getElementById('app').innerHTML=h;
}
render();
</script>
</body>
</html>
