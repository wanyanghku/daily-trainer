<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0b766e">
<title>IELTS 7月15日–24日冲刺工作台</title>
<style>
  :root{
    --teal:#0b766e; --teal-dark:#075f59; --teal-soft:#e9f7f4;
    --ink:#172126; --muted:#66757d; --line:#dce5e3; --paper:#fff;
    --surface:#f4f7f6; --warm:#f7f3e9;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:var(--surface)}
  body{margin:0;color:var(--ink);background:var(--surface);font-family:"PingFang SC","Hiragino Sans GB",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;line-height:1.45}
  button,a{font:inherit}
  .shell{width:min(100%,760px);margin:0 auto;padding:18px 15px 72px}
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding:4px 2px 14px;border-bottom:1px solid var(--line)}
  .eyebrow{color:var(--teal);font-size:10px;font-weight:800;letter-spacing:.15em;text-transform:uppercase}
  h1{margin:3px 0 2px;font-size:24px;line-height:1.2;letter-spacing:-.02em}
  .goal{margin:0;color:var(--muted);font-size:12px}
  .countdown{flex:0 0 auto;text-align:right;color:var(--teal-dark)}
  .countdown strong{display:block;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
  .countdown span{font-size:10px;font-weight:700}

  .today{margin:14px 0 12px;padding:16px 17px 15px;color:#fff;background:var(--teal);border-radius:16px;animation:settle .35s ease-out both}
  .today-top{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:11px;font-weight:700;color:rgba(255,255,255,.78)}
  .today h2{margin:7px 0 3px;font-size:23px;line-height:1.25;letter-spacing:-.015em}
  .today p{margin:0;color:rgba(255,255,255,.86);font-size:12.5px}
  .today-action{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:13px;padding-top:12px;border-top:1px solid rgba(255,255,255,.2)}
  .today-action small{font-size:11px;color:rgba(255,255,255,.74)}
  .start{display:inline-flex;align-items:center;gap:7px;min-height:40px;padding:9px 14px;border-radius:10px;color:var(--teal-dark);background:#fff;text-decoration:none;font-size:13px;font-weight:800;box-shadow:0 5px 16px rgba(1,42,39,.16)}
  .start:active{transform:translateY(1px)}

  .progress-block{padding:0 2px 11px}
  .progress-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;color:var(--muted);font-size:11px}
  .progress-meta strong{color:var(--ink);font-size:12px}
  .track{height:6px;overflow:hidden;border-radius:99px;background:#dfe8e6}
  .track i{display:block;height:100%;width:0;border-radius:inherit;background:var(--teal);transition:width .35s ease}
  .baseline{display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;margin:5px 2px 13px;padding:10px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .baseline b{color:var(--teal-dark);font-size:11px;white-space:nowrap}
  .baseline span{color:var(--muted);font-size:10.8px;line-height:1.5}
  .export-strip{display:grid;grid-template-columns:42px minmax(0,1fr) auto;align-items:center;gap:11px;width:calc(100% - 4px);min-height:64px;margin:5px 2px 8px;padding:10px 12px;border:1px solid var(--line);border-radius:14px;color:inherit;background:var(--paper);text-align:left;cursor:pointer;touch-action:manipulation;transition:border-color .18s ease,background-color .18s ease,transform .12s ease}
  .export-strip:active{transform:translateY(1px);background:#f8fbfa}
  .export-strip:disabled{cursor:wait;opacity:.72}
  .export-icon{display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:12px;color:var(--teal-dark);background:var(--teal-soft);font-size:18px;font-weight:900}
  .export-copy strong{display:block;font-size:13.5px}
  .export-copy span{display:block;margin-top:1px;color:var(--muted);font-size:10.5px;line-height:1.45}
  .export-go{color:var(--teal);font-size:12px;font-weight:800;white-space:nowrap}
  .export-status{min-height:16px;margin:-2px 4px 7px;color:var(--muted);font-size:10px;line-height:1.45}
  .export-status.success{color:var(--teal-dark)}
  .export-status.error{color:#a33a32}
  .practice-strip{display:grid;grid-template-columns:42px minmax(0,1fr) auto;align-items:center;gap:11px;margin:5px 2px 15px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);color:inherit;text-decoration:none}
  .practice-icon{display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:12px;color:#fff;background:var(--teal);font-size:19px}
  .practice-copy strong{display:block;font-size:13.5px}
  .practice-copy span{display:block;margin-top:1px;color:var(--muted);font-size:10.5px}
  .practice-go{color:var(--teal);font-size:12px;font-weight:800}
  .practice-strip:active{background:rgba(11,118,110,.035)}

  .phase{margin-top:16px}
  .phase-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:0 2px 7px}
  .phase-head h2{margin:0;font-size:14px;letter-spacing:.01em}
  .phase-head span{color:var(--muted);font-size:10.5px}
  .day-list{overflow:hidden;border:1px solid var(--line);border-radius:14px;background:var(--paper)}
  .day-row{display:grid;grid-template-columns:38px minmax(0,1fr);align-items:stretch;min-height:104px;border-top:1px solid #e9efed;transition:background-color .18s ease,box-shadow .18s ease}
  .day-row:first-child{border-top:0}
  .day-row.current{background:var(--teal-soft);box-shadow:inset 3px 0 var(--teal)}
  .day-row.done{background:#f7faf9}
  .day-row.pending{min-height:78px;background:#fafcfb;color:#82908c}
  .day-row.pending .day-link{cursor:default;padding-top:13px;padding-bottom:13px}
  .day-row.pending .new-title{margin-bottom:2px;font-weight:700;color:#66757d}
  .pending-mark{align-self:start;margin:18px 0 0 17px;color:#a9b5b2;font-size:18px;line-height:1}
  .check{align-self:start;width:26px;height:26px;margin:14px 0 0 10px;padding:0;border:1.5px solid #bdcbc8;border-radius:8px;color:transparent;background:#fff;cursor:pointer;font-size:14px;font-weight:900;line-height:23px}
  .check.done{border-color:var(--teal);color:#fff;background:var(--teal)}
  .check:disabled{cursor:default;opacity:1}
  .check:focus-visible,.day-link:focus-visible,.start:focus-visible,.export-strip:focus-visible,.practice-strip:focus-visible{outline:3px solid rgba(11,118,110,.25);outline-offset:2px}
  .day-link{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;padding:11px 13px 11px 3px;color:inherit;text-decoration:none}
  .day-link:active{background:rgba(11,118,110,.035)}
  .day-meta{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:10.5px;font-variant-numeric:tabular-nums}
  .new-kind{display:inline-flex;padding:1px 6px;border-radius:99px;color:var(--teal-dark);background:var(--teal-soft);font-size:9.5px;font-weight:800}
  .current .new-kind{background:#d6eee9}
  .new-title{margin:3px 0 5px;font-size:14px;font-weight:800}
  .summary{display:grid;grid-template-columns:18px minmax(0,1fr);gap:3px;color:var(--muted);font-size:10.8px;line-height:1.4}
  .summary b{color:var(--teal);font-size:9px;line-height:1.65}
  .row-state{align-self:center;min-width:42px;text-align:right;color:var(--muted);font-size:10px;font-variant-numeric:tabular-nums}
  .row-state strong{display:block;color:var(--teal);font-size:18px;line-height:1.1}
  .row-state .arrow{font-size:17px;color:var(--teal)}

  .light-day{margin:17px 2px 0;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-size:12px}
  .light-day strong{display:block;margin-bottom:2px;color:var(--teal-dark)}
  .light-day span{color:var(--muted)}
  .foot{margin-top:13px;color:#87938f;text-align:center;font-size:10px}
  .load-error{margin:40px auto;padding:18px;max-width:420px;border:1px solid var(--line);border-radius:12px;background:#fff;text-align:center}
  .load-error button{margin-top:10px;padding:8px 12px;border:0;border-radius:8px;color:#fff;background:var(--teal);font-weight:700}
  @keyframes settle{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  @media (max-width:430px){
    .shell{padding:14px 12px 58px}
    h1{font-size:22px}
    .today{border-radius:14px;padding:15px}
    .today h2{font-size:21px}
    .day-row{grid-template-columns:36px minmax(0,1fr)}
    .check{margin-left:8px}
    .day-link{padding-right:11px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<main class="shell" id="app" aria-live="polite">加载 10 天计划…</main>
<script>
const EXAM_DATE='2026-07-25';
const PROGRESS_KEY='ielts_sprint_20260715_progress';
const DONE_KEY='ielts_sprint_20260715_done';
const DAY_STATE_KEY=day=>`ielts_sprint_20260715_day${day}_v2`;
const EXPORT_SCHEMA='ielts-review-export/v2';
const BASELINE={
  asOf:'2026-07-15',
  learned:['G1 长久目标','Task 2 科技 Opinion','G2 逆袭的人','Task 1 流程图'],
  reviewState:'新内容基本跟上；复习不足；P1 已复习到 Life Stages。',
  source:'用户进度说明 + 2026-07-15 旧版一键导出'
};
const PHASES={
  1:{title:'当前执行',range:'7月15日–7月16日 · 已排定'},
  2:{title:'下一批安排',range:'7月17日–7月20日 · 等待导出'},
  3:{title:'考前收口',range:'7月21日–7月24日 · 保留容量'}
};
let DAYS=[];
let EXPORT_READY=false;
let EXPORT_SOURCE={p1:[],p2:[],p3:[],writing:[],reference:[],appVersion:null,warnings:[]};

function loadStore(key){
  try{return JSON.parse(localStorage.getItem(key)||'{}')||{};}catch(_){return {};}
}
function saveStore(key,value){localStorage.setItem(key,JSON.stringify(value));}
function exportStore(key,warnings){
  const raw=localStorage.getItem(key);
  if(raw===null)return {};
  try{
    const parsed=JSON.parse(raw);
    if(!parsed||typeof parsed!=='object'||Array.isArray(parsed))throw new Error('not an object');
    return parsed;
  }catch(_){
    warnings.push(`${key} 无法解析，已按空记录导出`);
    return {};
  }
}
function localISO(){
  const now=new Date();
  const y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function localDate(iso){const [y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d);}
function daysUntil(iso){
  const now=new Date();now.setHours(0,0,0,0);
  return Math.max(0,Math.round((localDate(iso)-now)/86400000));
}
function shortDate(iso){return iso.slice(5).replace('-','/');}
function esc(value){
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sourceById(kind,id){
  const list=EXPORT_SOURCE[kind]||[];
  if(kind==='p1'||kind==='p3')return list[Number(id)]||null;
  return list.find(item=>String(item.id)===String(id))||null;
}
function contentRef(kind,id,warnings){
  const item=sourceById(kind,id);
  if(!item){
    warnings.push(`${kind}:${id} 在导出目录中未找到`);
    return {kind,id:String(id),unresolved:true};
  }
  if(kind==='p1')return {kind,index:Number(id),topic:item.topic,cn:item.cn,tier:item.tier};
  if(kind==='p3')return {kind,index:Number(id),topic:item.topic,cn:item.cn};
  if(kind==='p2')return {kind,id:item.id,cn:item.cn};
  if(kind==='writing')return {kind,id:item.id,task:item.task,type:item.type,cn:item.cn,learned:!!item.learned};
  return {kind,id:item.id,cn:item.cn,covers:item.covers};
}
function activitySpecs(day,warnings){
  const specs=[];
  if(day.status==='pending')return specs;
  if(day.newP2){
    const ref=contentRef('p2',day.newP2,warnings);
    specs.push({activityId:`day${day.day}:p2-new:${day.newP2}`,category:'speaking',part:'p2',mode:'new',tier:'core',label:`母题 ${day.newP2} · ${ref.cn||day.newP2}`,contentRefs:[ref],storageItemId:`new_${day.newP2}`,tracking:'counters',targets:{read:3,recall:2,dictate:1},textFields:{dictation:'dictText'}});
  }
  if(day.newWriting){
    const ref=contentRef('writing',day.newWriting,warnings);
    specs.push({activityId:`day${day.day}:writing-new:${day.newWriting}`,category:'writing',part:'writing',mode:'new',tier:'core',label:`${ref.task||'Writing'} ${ref.type||''} · ${ref.cn||day.newWriting}`.trim(),contentRefs:[ref],storageItemId:`wnew_${day.newWriting}`,tracking:'counters',targets:{read:2,outline:2,core:1,transfer:1},textFields:{corePractice:'coreText',transferPractice:'transferText'}});
  }
  (day.reviewP2||[]).forEach(id=>{
    const ref=contentRef('p2',id,warnings);
    specs.push({activityId:`day${day.day}:p2-review:${id}`,category:'speaking',part:'p2',mode:'review',tier:'core',label:`母题 ${id} · ${ref.cn||id}（复习）`,contentRefs:[ref],storageItemId:`rev_${id}`,tracking:'boolean'});
  });
  if(day.reviewWriting&&day.reviewWriting.length){
    const refs=day.reviewWriting.map(id=>contentRef('writing',id,warnings));
    specs.push({activityId:`day${day.day}:writing-review`,category:'writing',part:'writing',mode:'review',tier:'core',label:`写作到期复习 · ${refs.length} 张`,contentRefs:refs,storageItemId:'wrev',tracking:'group_boolean'});
  }
  (day.p1||[]).forEach(index=>{
    const ref=contentRef('p1',index,warnings);
    const questionIndices=(day.p1QuestionMap&&day.p1QuestionMap[String(index)])||null;
    specs.push({activityId:`${day.date}:p1:${index}`,category:'speaking',part:'p1',mode:'review',tier:'core',label:`P1 · ${ref.topic||index}（${ref.cn||''}）`,contentRefs:[ref],questionIndices,questionNumbers:questionIndices&&questionIndices.map(value=>value+1),storageItemId:`p1_${index}`,tracking:'boolean'});
  });
  (day.p1Optional||[]).forEach(index=>{
    const ref=contentRef('p1',index,warnings);
    const questionIndices=(day.p1QuestionMap&&day.p1QuestionMap[String(index)])||null;
    specs.push({activityId:`${day.date}:p1-optional:${index}`,category:'speaking',part:'p1',mode:'optional_review',tier:'bonus',label:`可选 P1 · ${ref.topic||index}（${ref.cn||''}）`,contentRefs:[ref],questionIndices,questionNumbers:questionIndices&&questionIndices.map(value=>value+1),storageItemId:`p1opt_${index}`,tracking:'boolean'});
  });
  (day.p1prev||[]).forEach(index=>{
    const ref=contentRef('p1',index,warnings);
    specs.push({activityId:`${day.date}:p1-quick:${index}`,category:'speaking',part:'p1',mode:'quick_review',tier:'bonus',label:`P1 快速回扫 · ${ref.topic||index}`,contentRefs:[ref],storageItemId:`p1q_${index}`,tracking:'boolean'});
  });
  if(day.p3!==null&&day.p3!==undefined){
    const ref=contentRef('p3',day.p3,warnings);
    specs.push({activityId:`day${day.day}:p3`,category:'speaking',part:'p3',mode:'practice',tier:'bonus',label:`P3 · ${ref.cn||ref.topic||day.p3}`,contentRefs:[ref],storageItemId:'p3',tracking:'boolean'});
  }
  if(day.ref&&day.ref.length){
    specs.push({activityId:`day${day.day}:reference`,category:'speaking',part:'reference',mode:'review',tier:'bonus',label:`套用速查卡 · ${day.ref.length} 张`,contentRefs:day.ref.map(id=>contentRef('reference',id,warnings)),storageItemId:'REFC',tracking:'group_boolean'});
  }
  if(day.outputs&&day.outputs.length){
    const refs=day.outputs.map((title,index)=>({kind:'output',id:`day${day.day}-${index+1}`,title}));
    specs.push({activityId:`day${day.day}:output`,category:'mixed',part:'output',mode:'verification',tier:'core',label:'今日输出验收',contentRefs:refs,storageItemId:'OUT',tracking:'group_boolean'});
  }
  if(day.live!==false)specs.push({activityId:`${day.date}:mock`,category:'speaking',part:'mock',mode:'practice',tier:'bonus',label:'Live 模拟考 / 录音自查',contentRefs:[{kind:'date',id:day.date,title:'当日口语模拟'}],storageItemId:'REC',tracking:'boolean'});
  return specs;
}
function normalCount(value,target,label,warnings){
  const number=Number(value===undefined?0:value);
  if(!Number.isFinite(number)){
    warnings.push(`${label} 不是有效数字，已按 0 处理`);
    return 0;
  }
  const fixed=Math.max(0,Math.min(target,Math.round(number)));
  if(fixed!==number)warnings.push(`${label} 超出记录范围，已限制为 0–${target}`);
  return fixed;
}
function buildActivity(spec,dayState,warnings){
  const raw=dayState[spec.storageItemId];
  const saved=raw&&typeof raw==='object'&&!Array.isArray(raw)?raw:{};
  const userText={};
  Object.entries(spec.textFields||{}).forEach(([label,key])=>{
    if(typeof saved[key]==='string'&&saved[key].length)userText[label]=saved[key];
  });
  const highlightedTokenCount=Array.isArray(saved.hl)?saved.hl.length:0;
  if(saved.hl!==undefined&&!Array.isArray(saved.hl))warnings.push(`Day ${dayState.__day||'?'} ${spec.storageItemId}.hl 格式异常，已忽略`);
  let attempts={},markedDone=false,status='not_started',progressPercent=0;
  if(spec.tracking==='counters'){
    let doneTotal=0,targetTotal=0;
    Object.entries(spec.targets).forEach(([field,target])=>{
      const done=normalCount(saved[field],target,`Day ${dayState.__day||'?'} ${spec.storageItemId}.${field}`,warnings);
      attempts[field]={done,target};doneTotal+=done;targetTotal+=target;
    });
    progressPercent=targetTotal?Math.round(doneTotal/targetTotal*100):0;
    const interacted=doneTotal>0||Object.keys(userText).length>0||highlightedTokenCount>0;
    status=progressPercent>=100?'completed':interacted?'in_progress':'not_started';
  }else{
    markedDone=saved.done===true;
    status=markedDone?'completed':'not_started';
    progressPercent=markedDone?100:0;
  }
  return {...spec,status,progressPercent,attempts,markedDone,userText,highlightedTokenCount};
}
function statusCounts(activities){
  return ['completed','in_progress','not_started'].reduce((result,status)=>{
    result[status]=activities.filter(item=>item.status===status).length;return result;
  },{});
}
function buildCatalog(){
  return {
    p1:EXPORT_SOURCE.p1.map((item,index)=>({index,topic:item.topic,cn:item.cn,tier:item.tier,questionCount:Array.isArray(item.qa)?item.qa.length:0})),
    p2:EXPORT_SOURCE.p2.map(item=>({id:item.id,cn:item.cn,cue:item.cue})),
    p3:EXPORT_SOURCE.p3.map((item,index)=>({index,topic:item.topic,cn:item.cn,questionCount:Array.isArray(item.qa)?item.qa.length:0})),
    writing:EXPORT_SOURCE.writing.map(item=>({id:item.id,task:item.task,type:item.type,cn:item.cn,learned:!!item.learned,prompt:item.prompt})),
    reference:EXPORT_SOURCE.reference.map(item=>({id:item.id,cn:item.cn,covers:item.covers}))
  };
}
function buildReviewExport(){
  const warnings=[...EXPORT_SOURCE.warnings];
  const storedProgress=exportStore(PROGRESS_KEY,warnings);
  const manualDone=exportStore(DONE_KEY,warnings);
  const scheduledDays=DAYS.filter(day=>day.status==='active');
  const days=scheduledDays.map(day=>{
    const state=exportStore(DAY_STATE_KEY(day.day),warnings);
    Object.defineProperty(state,'__day',{value:day.day,enumerable:false});
    const activities=activitySpecs(day,warnings).map(spec=>buildActivity(spec,state,warnings));
    const core=activities.filter(item=>item.tier==='core');
    const calculatedCoreProgress=core.length?Math.round(core.reduce((sum,item)=>sum+item.progressPercent,0)/core.length):0;
    const storedValue=normalCount(storedProgress[day.day],100,`Day ${day.day} 首页进度`,warnings);
    const manualDayOverride=manualDone[day.day]===true;
    return {
      day:day.day,date:day.date,title:day.title,minutes:day.minutes,newLabel:day.newLabel,
      speakingSummary:day.speakingSummary,writingSummary:day.writingSummary,note:day.note,
      storedCoreProgress:storedValue,calculatedCoreProgress,manualDayOverride,
      effectiveHomeProgress:Math.max(storedValue,manualDayOverride?100:0),activities
    };
  });
  const activities=days.flatMap(day=>day.activities);
  const speaking=activities.filter(item=>item.category==='speaking');
  const writing=activities.filter(item=>item.category==='writing');
  const mixed=activities.filter(item=>item.category==='mixed');
  const startedDays=days.filter(day=>day.storedCoreProgress>0||day.manualDayOverride||day.activities.some(item=>item.status!=='not_started')).length;
  const completedDays=days.filter(day=>day.effectiveHomeProgress>=100).length;
  const p2Planned=new Set(scheduledDays.flatMap(day=>[day.newP2,...(day.reviewP2||[])]).filter(Boolean));
  const writingPlanned=new Set(scheduledDays.flatMap(day=>[day.newWriting,...(day.reviewWriting||[])]).filter(Boolean));
  const p1Planned=new Set(scheduledDays.flatMap(day=>[...(day.p1||[]),...(day.p1Optional||[])]));
  const p3Planned=new Set(scheduledDays.map(day=>day.p3).filter(value=>value!==null&&value!==undefined));
  const referencePlanned=new Set(scheduledDays.flatMap(day=>day.ref||[]));
  return {
    schemaVersion:EXPORT_SCHEMA,
    meta:{
      exportedAt:new Date().toISOString(),timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone||null,
      sourceUrl:location.origin+location.pathname,appVersion:EXPORT_SOURCE.appVersion,
      planStart:DAYS[0]&&DAYS[0].date,planEnd:DAYS[DAYS.length-1]&&DAYS[DAYS.length-1].date,
      storageSchema:'ielts_sprint_20260715_day{1..10}_v2'
    },
    baseline:BASELINE,
    planning:{activeDates:scheduledDays.map(day=>day.date),pendingDates:DAYS.filter(day=>day.status==='pending').map(day=>day.date),nextReview:'2026-07-16 evening export'},
    privacy:{generatedLocally:true,uploadedAutomatically:false,includesUserPracticeText:true,excludesQuestionBankAnswers:true,excludesModelAnswers:true,excludesAudio:true,excludesListening:true},
    measurementLimitations:[
      '导出只代表当前设备、当前浏览器中的站内记录，不会自动合并其他设备。',
      '计数按钮达到目标后不再累加，因此无法表示超出目标的额外练习次数。',
      'P1 已改为逐话题记录；每个话题完成仍不代表其中每道问题都达到同等熟练度。',
      '现有记录不含完成时间、练习时长或逐题正确率；手动整日完成不会反推子任务完成。'
    ],
    summary:{
      totalDays:days.length,totalPlanDates:DAYS.length,activeDates:scheduledDays.length,pendingDates:DAYS.length-scheduledDays.length,startedDays,completedDays,
      averageEffectiveProgress:days.length?Math.round(days.reduce((sum,day)=>sum+day.effectiveHomeProgress,0)/days.length):0,
      activityStatus:{all:statusCounts(activities),speaking:statusCounts(speaking),writing:statusCounts(writing),mixed:statusCounts(mixed)},
      plannedCoverage:{p1Topics:p1Planned.size,p2Mothers:p2Planned.size,p3Topics:p3Planned.size,writingUnits:writingPlanned.size,referenceCards:referencePlanned.size}
    },
    catalog:buildCatalog(),days,warnings
  };
}
function exportFilename(extension){
  const now=new Date(),pad=value=>String(value).padStart(2,'0');
  const stamp=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
  return `IELTS_复习详情_${stamp}.${extension}`;
}
function downloadReport(blob,filename){
  const url=URL.createObjectURL(blob),link=document.createElement('a');
  link.href=url;link.download=filename;link.style.display='none';document.body.appendChild(link);link.click();link.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function setExportStatus(message,tone=''){
  const status=document.getElementById('export-status');
  if(!status)return;
  status.textContent=message;status.className=`export-status ${tone}`.trim();
}
async function exportReview(event){
  const button=event.currentTarget;
  if(!EXPORT_READY){setExportStatus('导出数据仍在准备，请稍后再点。','error');return;}
  button.disabled=true;button.setAttribute('aria-busy','true');
  try{
    const text=JSON.stringify(buildReviewExport(),null,2);
    const jsonBlob=new Blob([text],{type:'application/json;charset=utf-8'});
    const shareFile=typeof File==='function'?new File([text],exportFilename('txt'),{type:'text/plain'}):null;
    let canShareFile=false;
    try{canShareFile=!!(shareFile&&navigator.share&&navigator.canShare&&navigator.canShare({files:[shareFile]}));}catch(_){canShareFile=false;}
    if(canShareFile){
      setExportStatus('正在打开系统分享菜单…');
      await navigator.share({files:[shareFile],title:'IELTS 口语＋作文复习详情',text:'当前浏览器中按实际日期记录的冲刺进度'});
      setExportStatus('分享操作已完成 ✓','success');
    }else{
      downloadReport(jsonBlob,exportFilename('json'));
      setExportStatus('复习详情文件已下载 ✓','success');
    }
  }catch(error){
    if(error&&error.name==='AbortError')setExportStatus('已取消分享，可以随时再次导出。');
    else{
      try{
        const text=JSON.stringify(buildReviewExport(),null,2);
        downloadReport(new Blob([text],{type:'application/json;charset=utf-8'}),exportFilename('json'));
        setExportStatus('分享不可用，已改为下载文件 ✓','success');
      }catch(_){setExportStatus('导出失败，请刷新后重试。','error');}
    }
  }finally{
    button.disabled=false;button.removeAttribute('aria-busy');
  }
}
async function loadExportSources(){
  const files={p1:'data-p1.json',p2:'data-p2.json',p3:'data-p3.json',writing:'data-writing.json',reference:'data-ref.json'};
  const entries=Object.entries(files);
  const requests=entries.map(([,path])=>fetch(`${path}?cb=${Date.now()}`,{cache:'no-store'}).then(response=>{
    if(!response.ok)throw new Error(`HTTP ${response.status}`);return response.json();
  }));
  const results=await Promise.allSettled(requests);
  results.forEach((result,index)=>{
    const [key,path]=entries[index];
    if(result.status==='fulfilled'&&Array.isArray(result.value))EXPORT_SOURCE[key]=result.value;
    else EXPORT_SOURCE.warnings.push(`${path} 读取失败，目录可能不完整`);
  });
  try{
    const response=await fetch(`app.js?cb=${Date.now()}`,{cache:'no-store'});
    if(!response.ok)throw new Error(`HTTP ${response.status}`);
    const match=(await response.text()).match(/const VERSION='([^']+)'/);
    EXPORT_SOURCE.appVersion=match?match[1]:null;
    if(!match)EXPORT_SOURCE.warnings.push('未能识别 app.js 版本号');
  }catch(_){EXPORT_SOURCE.warnings.push('app.js 版本号读取失败');}
  EXPORT_READY=true;
}
function rawProgress(day){
  const value=Number(loadStore(PROGRESS_KEY)[day]||0);
  return Math.max(0,Math.min(100,Number.isFinite(value)?Math.round(value):0));
}
function isManualDone(day){return !!loadStore(DONE_KEY)[day];}
function effectiveProgress(day){return Math.max(rawProgress(day),isManualDone(day)?100:0);}
function toggleDone(event,day){
  event.preventDefault();event.stopPropagation();
  if(rawProgress(day)>=100)return;
  const done=loadStore(DONE_KEY);
  done[day]=!done[day];
  saveStore(DONE_KEY,done);
  render();
}
function currentDay(today){return DAYS.find(day=>day.date===today)||null;}
function ctaDay(today){
  const active=DAYS.filter(day=>day.status==='active');
  const exact=active.find(day=>day.date===today);
  if(exact)return exact;
  if(today<active[0].date)return active[0];
  return active[active.length-1];
}
function renderRow(day,today){
  if(day.status==='pending')return `<div class="day-row pending">
    <span class="pending-mark" aria-hidden="true">·</span>
    <div class="day-link" aria-label="${esc(day.title)}待安排">
      <div><div class="day-meta"><span>${esc(day.title)}</span><span class="new-kind">待安排</span></div><div class="new-title">${esc(day.newLabel)}</div><div class="summary"><b>说明</b><span>${esc(day.note)}</span></div></div>
      <div class="row-state"><span>—</span></div>
    </div>
  </div>`;
  const progress=rawProgress(day.day);
  const done=progress>=100||isManualDone(day.day);
  const current=day.date===today;
  const kind=day.newP2?'口语新背':day.newWriting?'写作新背':'复习日';
  const state=done?'<strong>✓</strong><span>完成</span>':progress?`<strong>${progress}%</strong><span>继续 →</span>`:'<span class="arrow">→</span>';
  return `<div class="day-row${current?' current':''}${done?' done':''}">
    <button class="check${done?' done':''}" type="button" aria-label="${done?'取消手动完成':'标记完成'} ${esc(day.title)}" onclick="toggleDone(event,${day.day})" ${progress>=100?'disabled':''}>✓</button>
    <a class="day-link" href="daily/Day${day.day}.html" aria-label="打开 ${esc(day.title)}：${esc(day.newLabel)}">
      <div>
        <div class="day-meta"><span>${esc(day.title)}</span><span>${day.minutes} 分钟</span><span class="new-kind">${kind}</span></div>
        <div class="new-title">${esc(day.newLabel)}</div>
        <div class="summary"><b>口语</b><span>${esc(day.speakingSummary)}</span></div>
        <div class="summary"><b>写作</b><span>${esc(day.writingSummary)}</span></div>
      </div>
      <div class="row-state">${state}</div>
    </a>
  </div>`;
}
function render(){
  if(!DAYS.length)return;
  const today=localISO();
  const active=DAYS.filter(day=>day.status==='active');
  const focus=ctaDay(today);
  const exact=currentDay(today);
  const pendingToday=exact&&exact.status==='pending';
  const total=Math.round(active.reduce((sum,day)=>sum+effectiveProgress(day.day),0)/active.length);
  const completed=active.filter(day=>effectiveProgress(day.day)>=100).length;
  const focusProgress=effectiveProgress(focus.day);
  const todayKicker=pendingToday?`${esc(exact.title)} · 待安排`:exact?`今天 · ${esc(focus.title)} · ${focus.minutes} 分钟`:`继续 ${esc(focus.title)} 的任务`;
  const todayTitle=pendingToday?esc(exact.newLabel):esc(focus.newLabel);
  const todayCopy=pendingToday?'先完成已排日期并导出，后续任务不凭感觉提前堆入。':focus.date==='2026-07-15'?'今天页面只有 G3，不显示 P1、作文或其他母题。':'F1 是唯一新内容，其余均为短时主动提取。';
  const todayAction=pendingToday?`<small>${esc(exact.note)}</small><span class="start" aria-disabled="true">等待导出</span>`:`<small>${esc(focus.speakingSummary)}</small><a class="start" href="daily/Day${focus.day}.html">开始 ${esc(focus.title)} <span>→</span></a>`;
  let html=`<header class="topbar">
      <div><div class="eyebrow">IELTS · Mainland</div><h1>7月15日–24日冲刺</h1><p class="goal">口语 6.5 · 写作 6.5 · 当前只排未来两天</p></div>
      <div class="countdown"><strong>${daysUntil(EXAM_DATE)}</strong><span>天后考试</span></div>
    </header>
    <section class="today">
      <div class="today-top"><span>${todayKicker}</span><span>${focusProgress}%</span></div>
      <h2>${todayTitle}</h2><p>${todayCopy}</p>
      <div class="today-action">${todayAction}</div>
    </section>
    <section class="progress-block" aria-label="当前两日进度">
      <div class="progress-meta"><strong>当前两日 ${total}%</strong><span>${completed} / ${active.length} 个日期完成</span></div>
      <div class="track"><i style="width:${total}%"></i></div>
    </section>
    <section class="baseline" aria-label="已完成基线"><b>已完成基线</b><span>G1、科技 Opinion、G2、流程图；当前主要缺口是间隔复习，P1 已复习到 Life Stages。</span></section>
    <button class="export-strip" type="button" onclick="exportReview(event)" aria-describedby="export-status">
      <span class="export-icon" aria-hidden="true">⇩</span><span class="export-copy"><strong>导出全部复习详情</strong><span>按实际日期导出7月15–16日的逐项进度与练习文本 · 不含听力</span></span><span class="export-go">一键导出</span>
    </button>
    <p class="export-status" id="export-status" role="status" aria-live="polite">仅导出当前浏览器本地记录 · 本地生成 · 不会上传</p>
    <a class="practice-strip" href="listening.html" aria-label="打开独立听力专项">
      <span class="practice-icon">🎧</span><span class="practice-copy"><strong>听力专项 · Day 1 从今天开始</strong><span>答题规则 · 填空 · 选择 · 匹配 · 地图｜另含时间系列 50 题</span></span><span class="practice-go">进入 →</span>
    </a>`;
  [1,2,3].forEach(phase=>{
    const info=PHASES[phase];
    html+=`<section class="phase"><div class="phase-head"><h2>${info.title}</h2><span>${info.range}</span></div><div class="day-list">`;
    DAYS.filter(day=>day.phase===phase).forEach(day=>{html+=renderRow(day,today);});
    html+='</div></section>';
  });
  html+=`<section class="light-day"><strong>7月16日晚 · 一键导出</strong><span>导出后再安排7月17–24日；7月23日前完成新内容，7月24日保留轻复习容量。</span></section>
    <div class="foot">按日期自动同步进度 · P1 每个话题独立记录 · 7月25日考试</div>`;
  document.getElementById('app').innerHTML=html;
}
async function boot(){
  try{
    const response=await fetch('data-days.json?cb='+Date.now(),{cache:'no-store'});
    if(!response.ok)throw new Error('HTTP '+response.status);
    DAYS=await response.json();
    if(!Array.isArray(DAYS)||DAYS.length!==10)throw new Error('计划数据不完整');
    await loadExportSources();
    render();
  }catch(error){
    document.getElementById('app').innerHTML=`<div class="load-error"><strong>10 天计划加载失败</strong><div class="goal">${esc(error.message)}</div><button type="button" onclick="location.reload()">重新加载</button></div>`;
  }
}
window.addEventListener('storage',event=>{if(event.key===PROGRESS_KEY||event.key===DONE_KEY)render();});
window.addEventListener('pageshow',()=>{if(DAYS.length)render();});
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&DAYS.length)render();});
boot();
</script>
</body>
